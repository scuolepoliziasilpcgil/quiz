<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corso Allievi Agenti — Presentazione SILP CGIL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500&family=Nunito:wght@900&display=swap" rel="stylesheet">
<style>
  :root{
    --blu-deep:#234C72;
    --blu:#3A6CA0;
    --rosso:#C8102E;
    --giallo:#FFE699;
    --verde:#4FA66B;
    --crema:#F7F3E8;
    --accent-p1:#9FD8FF;
    --accent-p2:#FFD27A;
    --accent-p3:#B6E3C0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--blu-deep);
    color:var(--crema);
    overflow:hidden;
    height:100vh;
    display:flex;
    flex-direction:column;
  }
  /* TOPBAR */
  .topbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:1.1rem 1.6rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.78rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--crema);
    opacity:.85;
    flex:0 0 auto;
    gap:1rem;
  }
  .topbar-brand{display:flex; align-items:center; gap:.6rem; font-weight:600;letter-spacing:.18em; justify-self:start;}
  .topbar-right{display:flex; align-items:center; gap:1rem; justify-self:end;}
  .rev-tag{
    position:fixed;
    bottom:.5rem;
    right:.7rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.62rem;
    letter-spacing:.05em;
    color:var(--crema);
    opacity:.35;
    z-index:40;
    pointer-events:none;
  }
  .rejoin-qr{
    position:fixed;
    top:6.1rem;
    right:.9rem;
    z-index:25;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.35rem;
    background:rgba(20,35,63,.75);
    border:1px solid rgba(247,243,232,.25);
    border-radius:12px;
    padding:.55rem .7rem;
  }
  .rejoin-qr-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:.64rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--crema);
    opacity:.8;
    text-align:center;
  }
  .rejoin-qr img{border-radius:8px; background:var(--crema); display:block;}
  .logo-mark{width:3.4rem; height:3.4rem; flex:0 0 auto; border-radius:8px; object-fit:cover;}
  .logo-flank{
    width:clamp(9rem,34vmin,24rem);
    height:auto;
    flex:0 0 auto;
    border-radius:14px;
    box-shadow:0 10px 28px rgba(0,0,0,.32);
  }
  .topbar-section{text-align:center;}
  .topbar-counter{font-weight:500;}
  .stats-badge{display:flex; gap:1.2rem; align-items:center; flex:0 0 auto;}
  .stat-pill{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.1rem;
    font-family:'IBM Plex Mono',monospace;
  }
  .stat-pill-num{
    font-size:1.15rem;
    font-weight:700;
    line-height:1;
  }
  .stat-pill-label{
    font-size:.58rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    opacity:.65;
  }
  .icon-btn{
    background:transparent;
    border:1px solid rgba(247,243,232,.35);
    color:var(--crema);
    width:2.2rem;
    height:2.2rem;
    border-radius:50%;
    cursor:pointer;
    flex:0 0 auto;
    font-size:1rem;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon-btn:hover{background:rgba(247,243,232,.15);}
  /* STAGE */
  .stage{
    flex:1 1 auto;
    position:relative;
    overflow:hidden;
  }
  .slide{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:2rem 6vw 4rem;
    opacity:0;
    transform:translateY(18px);
    transition:opacity .35s ease, transform .35s ease;
    pointer-events:none;
    overflow:hidden;
  }
  .slide.active{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  /* entrata animata del contenuto della slide attiva */
  .slide.active > *{
    animation:slideInUp .5s cubic-bezier(.16,.84,.44,1) both;
  }
  @keyframes slideInUp{
    from{opacity:0; transform:translateY(22px);}
    to{opacity:1; transform:translateY(0);}
  }
  .slide[data-bg="deep"]{background:radial-gradient(circle at 50% 30%, var(--blu) 0%, var(--blu-deep) 70%);}
  .slide[data-bg="blu"]{background:var(--blu);}
  .slide[data-bg="giallo"]{background:var(--giallo); color:var(--blu-deep);}
  /* accento colore per periodo: alone radiale dietro le domande */
  .slide[data-accent="p1"]{background:radial-gradient(circle at 50% 24%, color-mix(in srgb, var(--accent-p1) 55%, var(--blu)) 0%, var(--blu-deep) 78%);}
  .slide[data-accent="p2"]{background:radial-gradient(circle at 50% 24%, color-mix(in srgb, var(--accent-p2) 52%, var(--blu)) 0%, var(--blu-deep) 78%);}
  .slide[data-accent="p3"]{background:radial-gradient(circle at 50% 24%, color-mix(in srgb, var(--accent-p3) 55%, var(--blu)) 0%, var(--blu-deep) 78%);}
  /* NARRAZIONE */
  .narrazione-motivo{
    font-family:'IBM Plex Mono',monospace;
    font-size:.78rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    opacity:.55;
    margin-bottom:.8rem;
  }
  .narrazione-titolo{
    font-family:'Space Grotesk',sans-serif;
    font-weight:800;
    font-size:clamp(2rem,5vw,3.4rem);
    line-height:1.12;
    margin-bottom:1.4rem;
    color:var(--crema);
  }
  .narrazione-testo{
    font-size:clamp(1.1rem,2.6vw,1.5rem);
    line-height:1.6;
    max-width:52ch;
    opacity:.9;
  }
  .narrazione-logo{
    width:clamp(3rem,6vw,5rem);
    height:auto;
    border-radius:10px;
    margin-bottom:1.2rem;
    box-shadow:0 6px 18px rgba(0,0,0,.25);
  }
  .narrazione-num{
    position:absolute;
    right:3vw;
    bottom:3vh;
    font-family:'Space Grotesk',sans-serif;
    font-weight:900;
    font-size:clamp(5rem,14vw,11rem);
    color:var(--rosso);
    opacity:.18;
    line-height:1;
    user-select:none;
    pointer-events:none;
    z-index:0;
  }
  /* TITLE SLIDE */
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:.85rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    opacity:.75;
    margin-bottom:1.2rem;
  }
  .title-big{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(4.5rem,16vmin,10rem);
    line-height:1;
    margin:0 0 .3rem;
    background:linear-gradient(180deg, var(--crema) 15%, var(--giallo) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 46px rgba(255,230,153,.4));
  }
  .title-sub{
    font-size:clamp(1.2rem,2.8vw,1.8rem);
    font-weight:600;
    max-width:38ch;
    margin-left:auto;
    margin-right:auto;
    opacity:.95;
  }
  .title-meta{
    margin-top:.9rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.9rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    opacity:.65;
  }
  .title-accent-line{
    width:4.5rem;
    height:4px;
    border-radius:2px;
    background:linear-gradient(90deg, var(--rosso), var(--giallo));
    margin:1.3rem auto;
  }
  .title-date-corner{
    position:absolute !important;
    top:1.6rem;
    right:2rem;
    font-family:'IBM Plex Mono',monospace;
    font-weight:700;
    font-size:clamp(1.1rem,2.6vmin,1.6rem);
    letter-spacing:.05em;
    color:var(--giallo);
    text-transform:uppercase;
    z-index:2;
  }
  .title-columns{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    gap:1.5rem;
  }
  .title-col-side{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .title-col-center{
    flex:1 1 auto;
    min-width:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  .title-logo-col{
    width:min(24vw,58vh);
    height:auto;
    border-radius:14px;
    box-shadow:0 10px 28px rgba(0,0,0,.32);
    animation:heartbeat 1.8s ease-in-out infinite;
  }
  .qr-join-img{
    border-radius:22px;
  }
  .title-scuola-badge{
    display:inline-block;
    margin:0 0 .8rem;
    padding:.75rem 2rem;
    background:linear-gradient(90deg, var(--rosso), #a80d24);
    color:var(--crema);
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(1.4rem,3.6vmin,2.2rem);
    border-radius:999px;
    box-shadow:0 10px 30px rgba(200,16,46,.45);
    letter-spacing:.01em;
    max-width:80vw;
  }
  .slide[data-bg="titlehero"]{
    overflow:hidden;
    background:radial-gradient(circle at 50% 18%, var(--blu) 0%, var(--blu-deep) 62%, #0c1730 100%);
  }
  .slide[data-bg="titlehero"]::before,
  .slide[data-bg="titlehero"]::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(95px);
    opacity:.32;
    pointer-events:none;
    z-index:0;
  }
  .slide[data-bg="titlehero"]::before{
    width:34rem; height:34rem;
    background:var(--rosso);
    top:-15rem; left:-11rem;
    animation:titleGlow1 17s ease-in-out infinite;
  }
  .slide[data-bg="titlehero"]::after{
    width:30rem; height:30rem;
    background:var(--giallo);
    bottom:-13rem; right:-9rem;
    animation:titleGlow2 19s ease-in-out infinite;
  }
  @keyframes titleGlow1{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(3rem,2rem) scale(1.18);}
  }
  @keyframes titleGlow2{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-2.5rem,-2rem) scale(1.12);}
  }
  .slide[data-bg="titlehero"] > *{position:relative; z-index:1;}
  .title-scuola{
    margin-top:1rem;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(1.3rem,3.2vw,2rem);
    color:var(--giallo);
    max-width:34ch;
  }
  .title-note{
    margin-top:1.4rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.85rem;
    opacity:.55;
    max-width:40ch;
  }
  .qr-block{
    margin-top:2rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.6rem;
  }
  .qr-row{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:4rem;
  }
  .closing-logos{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5rem;
    flex-wrap:wrap;
    margin-bottom:3rem;
  }
  /* SLIDE FINALE */
  .closing-grid{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:2rem;
    width:100%;
  }
  .closing-side{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.9rem;
  }
  .closing-side .logo-flank{
    width:clamp(10rem,20vw,18rem);
    height:auto;
    border-radius:14px;
    box-shadow:0 10px 28px rgba(0,0,0,.32);
  }
  .closing-side img.qr-contact{
    border-radius:10px;
  }
  .closing-side-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:.68rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    opacity:.6;
  }
  .closing-center{
    text-align:center;
  }
  .qr-block img{
    border-radius:14px;
    border:6px solid var(--crema);
    background:var(--crema);
  }
  .qr-block .logo-flank{
    border:none;
    background:none;
  }
  .qr-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:.85rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    opacity:.7;
  }
  .qr-url{
    font-family:'IBM Plex Mono',monospace;
    font-size:.85rem;
    opacity:.8;
    word-break:break-all;
    max-width:34ch;
  }
  /* BADGE */
  .badge{
    display:inline-flex;
    align-items:center;
    gap:.5rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;
    font-weight:500;
    letter-spacing:.18em;
    text-transform:uppercase;
    padding:.35rem .9rem;
    border-radius:999px;
    border:1px solid currentColor;
    opacity:.85;
    margin-bottom:.6rem;
  }
  .badge.wordcloud{color:#9FD8FF;}
  .badge.sondaggio{color:#FFD27A;}
  .badge.quiz{color:#FF9AA8;}
  /* QUESTION */
  .question{
    font-family:'Inter',sans-serif;
    font-weight:900;
    font-size:clamp(1.7rem,3.8vw,2.8rem);
    line-height:1.18;
    max-width:34ch;
    margin:0 0 .8rem;
  }
  .question .hl{color:var(--giallo);}
  .slide[data-bg="giallo"] .question .hl{color:var(--rosso);}
  .hint{
    font-size:1rem;
    opacity:.7;
    max-width:34ch;
    margin-bottom:1.4rem;
  }
  /* OPTIONS + RESULTS */
  .options{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:clamp(.6rem,1.2vw,1.1rem);
    width:100%;
    max-width:1200px;
    margin-bottom:.8rem;
    flex:1 1 auto;
    align-content:stretch;
  }
  /* colonne adattive per numero di risposte */
  .options[data-count="2"]{ grid-template-columns:repeat(2,1fr); }
  .options[data-count="3"]{ grid-template-columns:repeat(3,1fr); }
  .options[data-count="4"]{ grid-template-columns:repeat(2,1fr); }

  /* slide con opzioni: parte dall'alto per dare tutto lo spazio alle risposte */
  .slide:has(.options){
    justify-content:flex-start;
    padding-top:clamp(1rem,2.5vh,2rem);
  }

  .option{
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    gap:clamp(.6rem,1.2vw,1.1rem);
    background:rgba(247,243,232,.08);
    border:1px solid rgba(247,243,232,.18);
    border-radius:18px;
    padding:clamp(1rem,2.5vw,2rem) clamp(1.1rem,2.8vw,2.2rem);
    font-size:clamp(1.15rem,2.6vw,2rem);
    font-weight:700;
    text-align:left;
    min-height:clamp(3.8rem,9vh,7rem);
  }
  .slide[data-bg="giallo"] .option{
    background:rgba(20,35,63,.06);
    border-color:rgba(20,35,63,.18);
  }
  .option .letter{
    font-family:'IBM Plex Mono',monospace;
    font-size:clamp(.95rem,1.8vw,1.4rem);
    opacity:.6;
    border:1px solid currentColor;
    border-radius:10px;
    width:clamp(2.1rem,3.8vw,3rem);
    height:clamp(2.1rem,3.8vw,3rem);
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
    z-index:1;
  }
  .option .opt-text{z-index:1; flex:1; line-height:1.3; text-align:center; font-weight:700;}
  .option .opt-count{
    z-index:1;
    font-family:'IBM Plex Mono',monospace;
    font-size:clamp(.9rem,1.5vw,1.2rem);
    font-weight:700;
    opacity:.8;
    min-width:2.5rem;
    text-align:right;
  }
  .option .bar-fill{
    position:absolute;
    left:0; top:0; bottom:0;
    width:0%;
    background:rgba(79,166,107,.35);
    transition:width .9s cubic-bezier(.22,.86,.4,1);
  }
  .slide[data-accent="p1"] .option .bar-fill{background:color-mix(in srgb, var(--accent-p1) 40%, transparent);}
  .slide[data-accent="p2"] .option .bar-fill{background:color-mix(in srgb, var(--accent-p2) 42%, transparent);}
  .slide[data-accent="p3"] .option .bar-fill{background:color-mix(in srgb, var(--accent-p3) 42%, transparent);}
  /* COUNTDOWN VISIVO */
  .countdown-bar{
    position:absolute;
    top:0; left:0;
    height:5px;
    width:100%;
    background:var(--giallo);
    transform-origin:left center;
    z-index:5;
    opacity:.9;
  }
  .slide[data-bg="deep"] .countdown-bar, .slide[data-accent] .countdown-bar{background:var(--giallo);}
  .countdown-bar.running{
    animation:countdownShrink linear forwards;
  }
  @keyframes countdownShrink{
    from{transform:scaleX(1);}
    to{transform:scaleX(0);}
  }
  /* OVERLAY 3 2 1 VIA! */
  #cdCountdown{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:20;
    pointer-events:none;
    background:rgba(0,0,0,.28);
    opacity:0;
    transition:opacity .22s;
  }
  #cdCountdown.visible{ opacity:1; }
  #cdNumber{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:clamp(7rem,22vw,16rem);
    color:var(--crema);
    line-height:1;
    text-shadow:0 0 60px rgba(255,230,153,.5), 0 4px 24px rgba(0,0,0,.5);
    animation:cdPop .85s ease both;
  }
  #cdNumber.via-text{
    font-size:clamp(4rem,14vw,10rem);
    color:var(--giallo);
    letter-spacing:.04em;
  }
  @keyframes cdPop{
    0%  { transform:scale(2.2); opacity:0; }
    25% { transform:scale(1);   opacity:1; }
    75% { transform:scale(1);   opacity:1; }
    100%{ transform:scale(.5);  opacity:0; }
  }
  /* Numero grande semitrasparente durante il conto alla rovescia */
  .cd-big-num{
    position:absolute;
    right:2.5vw;
    bottom:5vh;
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:clamp(5rem,14vw,11rem);
    color:var(--crema);
    opacity:.13;
    line-height:1;
    user-select:none;
    pointer-events:none;
    z-index:3;
    transition:color .4s, opacity .4s;
  }
  .cd-big-num.urgent{ color:var(--rosso); opacity:.38; }
  /* LOGHI PULSANTI sulla slide titolo */
  .heartbeat-logo{
    animation:heartbeat 1.8s ease-in-out infinite;
  }
  .qr-row .heartbeat-logo:last-child{animation-delay:.9s;}
  .closing-grid .closing-side:last-child .heartbeat-logo{animation-delay:.9s;}
  .title-slide-logos{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:3rem;
    margin-bottom:2rem;
    flex-wrap:wrap;
  }
  .title-slide-logos .logo-flank{
    width:clamp(7rem,14vw,12rem);
    height:auto;
    animation:heartbeat 1.8s ease-in-out infinite;
  }
  .title-slide-logos .logo-flank:nth-child(2){animation-delay:.9s;}
  @keyframes heartbeat{
    0%, 100%{transform:scale(1);}
    15%{transform:scale(1.08);}
    30%{transform:scale(1);}
    45%{transform:scale(1.05);}
    60%{transform:scale(1);}
  }
  /* SCHERMATA ATTESA VIVA (tra le slide, lato relatore non serve, qui per coerenza) */
  /* TOOLBAR (reveal + results) */
  .toolbar{
    display:flex;
    gap:.7rem;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:1rem;
  }
  .ghost-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:.85rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    background:transparent;
    border:1px solid var(--crema);
    color:var(--crema);
    border-radius:999px;
    padding:.7rem 1.6rem;
    cursor:pointer;
    transition:background .2s, color .2s;
  }
  .slide[data-bg="giallo"] .ghost-btn{border-color:var(--blu-deep); color:var(--blu-deep);}
  .ghost-btn:hover{background:var(--crema); color:var(--blu-deep);}
  .slide[data-bg="giallo"] .ghost-btn:hover{background:var(--blu-deep); color:var(--giallo);}
  .answer-panel{
    display:none;
    margin-top:.6rem;
    max-width:640px;
    background:rgba(79,166,107,.16);
    border:1px solid var(--verde);
    border-radius:16px;
    padding:1.1rem 1.4rem;
    font-size:1.05rem;
    line-height:1.5;
  }
  .answer-panel.open{display:block; animation:fadein .3s ease;}

  /* ===== CLASSIFICA OVERLAY panquiz-style ===== */
  #classificaOverlay{
    display:none;
    position:fixed;
    inset:0;
    z-index:200;
    background:rgba(18,32,50,.97);
    flex-direction:column;
    align-items:center;
    padding:2rem 2.5rem 1.5rem;
    animation:overlayIn .35s ease both;
  }
  #classificaOverlay.open{ display:flex; }
  @keyframes overlayIn{
    from{opacity:0; transform:scale(.96);}
    to{opacity:1; transform:scale(1);}
  }
  .clov-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    max-width:900px;
    margin-bottom:1.2rem;
    flex:0 0 auto;
  }
  .clov-titolo{
    font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    opacity:.6;
    display:flex;
    align-items:center;
    gap:.5rem;
  }
  .class-live-dot{
    display:inline-block;
    width:.48rem; height:.48rem;
    border-radius:50%;
    background:var(--verde);
    flex:0 0 auto;
    animation:dotPulse 1.4s ease-in-out infinite;
  }
  .clov-fase{
    font-family:'IBM Plex Mono',monospace;
    font-size:.7rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    opacity:.45;
    transition:opacity .3s;
  }
  .clov-close{
    font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    background:transparent;
    border:1px solid rgba(247,243,232,.3);
    color:var(--crema);
    padding:.45rem 1.4rem;
    border-radius:999px;
    cursor:pointer;
    transition:border-color .15s;
  }
  .clov-close:hover{ border-color:var(--crema); }
  .clov-lista{
    width:100%;
    max-width:900px;
    flex:1 1 0;
    overflow:hidden;
    position:relative;
  }
  .clov-empty{
    opacity:.4;
    font-size:1rem;
    text-align:center;
    padding:3rem;
  }
  .clov-riga{
    display:flex;
    align-items:center;
    gap:1rem;
    padding:.75rem 1.2rem;
    border-radius:14px;
    margin-bottom:.4rem;
    background:rgba(247,243,232,.07);
    font-size:1.15rem;
    will-change:transform;
  }
  .clov-riga.top1{background:rgba(255,210,0,.2); border:1px solid rgba(255,210,0,.4);}
  .clov-riga.top2{background:rgba(192,192,192,.15); border:1px solid rgba(192,192,192,.3);}
  .clov-riga.top3{background:rgba(205,127,50,.15); border:1px solid rgba(205,127,50,.3);}
  .clov-riga.gained{ animation:gainedPulse 1s ease .2s both; }
  @keyframes gainedPulse{
    0%{ box-shadow:0 0 0 0 rgba(79,166,107,.6); }
    50%{ box-shadow:0 0 0 8px rgba(79,166,107,0); background:rgba(79,166,107,.25); }
    100%{ box-shadow:none; }
  }
  .clov-pos{ font-family:'IBM Plex Mono',monospace; font-size:.9rem; min-width:2.4rem; text-align:center; flex:0 0 auto; }
  .clov-nick{ flex:1; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .clov-pts{ font-family:'IBM Plex Mono',monospace; font-size:1rem; font-weight:700; flex:0 0 auto; letter-spacing:.02em; }
  .clov-delta{
    font-family:'IBM Plex Mono',monospace;
    font-size:.78rem;
    min-width:3.2rem;
    text-align:right;
    flex:0 0 auto;
    font-weight:700;
  }
  .clov-delta.su{ color:#4FA66B; }
  .clov-delta.giu{ color:#C8102E; opacity:.8; }
  .clov-delta.zero{ opacity:.22; }

  @keyframes fadein{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
  .update-badge{
    display:inline-flex;
    align-items:center;
    gap:.35rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--verde);
    opacity:0;
    margin-left:.7rem;
    transition:opacity .4s ease;
  }
  .update-badge::before{
    content:"";
    width:.45rem;
    height:.45rem;
    border-radius:50%;
    background:var(--verde);
    flex:0 0 auto;
  }
  .update-badge.visibile{opacity:1;}
  .answer-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:.75rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--verde);
    display:block;
    margin-bottom:.4rem;
  }
  /* WORD CLOUD RESULTS */
  .cloud-wrap{
    display:none;
    position:relative;
    width:100%;
    max-width:680px;
    height:min(38vh,320px);
    margin-top:.4rem;
  }
  .cloud-wrap.open{display:block; animation:fadein .3s ease;}
  .cloud-canvas{width:100%; height:100%; display:block;}
  .cloud-empty{
    font-family:'IBM Plex Mono',monospace;
    font-size:.85rem;
    opacity:.6;
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  /* PAUSA */
  .slide[data-bg="verde"]{
    overflow:hidden;
    color:var(--crema);
    background:linear-gradient(120deg, #2E6B45, var(--verde), #245C3A, var(--verde));
    background-size:300% 300%;
    animation:pausaGradiente 12s ease infinite;
  }
  @keyframes pausaGradiente{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  .slide[data-bg="verde"]::before,
  .slide[data-bg="verde"]::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    opacity:.35;
    pointer-events:none;
    z-index:0;
  }
  .slide[data-bg="verde"]::before{
    width:26rem; height:26rem;
    background:var(--giallo);
    top:-10rem; left:-8rem;
    animation:pausaBlob1 14s ease-in-out infinite;
  }
  .slide[data-bg="verde"]::after{
    width:22rem; height:22rem;
    background:var(--crema);
    bottom:-9rem; right:-7rem;
    animation:pausaBlob2 16s ease-in-out infinite;
  }
  @keyframes pausaBlob1{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(3rem,2rem) scale(1.2);}
  }
  @keyframes pausaBlob2{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-2.5rem,-2rem) scale(1.15);}
  }
  .slide[data-bg="verde"] > *{position:relative; z-index:1;}
  .pausa-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(2.6rem,7vw,5rem);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin:0 0 .3rem;
    background:linear-gradient(90deg, var(--crema), var(--giallo), var(--crema));
    background-size:220% auto;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:pausaTitoloShine 3.5s linear infinite, pausaTitoloIn .7s ease both;
  }
  @keyframes pausaTitoloShine{
    to{background-position:-220% center;}
  }
  @keyframes pausaTitoloIn{
    from{opacity:0; transform:scale(.85) translateY(-.6rem);}
    to{opacity:1; transform:scale(1) translateY(0);}
  }
  .pausa-sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:.95rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    opacity:.6;
    margin-bottom:2rem;
  }
  .pausa-list{
    list-style:none;
    padding:0;
    margin:0;
    display:flex;
    flex-direction:column;
    gap:.8rem;
    text-align:left;
  }
  .pausa-list li{
    font-size:1.2rem;
    font-weight:600;
    display:flex;
    align-items:flex-start;
    gap:.7rem;
  }
  .pausa-list li::before{
    content:"★";
    font-weight:700;
    color:var(--giallo);
    flex:0 0 auto;
    animation:pausaStellaPulse 1.6s ease-in-out infinite;
  }
  @keyframes pausaStellaPulse{
    0%,100%{transform:scale(1); opacity:.85;}
    50%{transform:scale(1.35); opacity:1;}
  }
  .pausa-list li{
    opacity:0;
    animation:pausaRigaIn .7s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes pausaRigaIn{
    from{opacity:0; transform:translateX(-2.2rem) scale(.9);}
    60%{opacity:1;}
    to{opacity:1; transform:translateX(0) scale(1);}
  }
  .pausa-icon{
    display:inline-block;
    margin-bottom:.6rem;
    animation:pausaIconDondolo 3.2s ease-in-out infinite;
    filter:drop-shadow(0 0 18px rgba(255,230,153,.55));
  }
  .pausa-icon svg{width:4rem; height:4rem;}
  .steam-line{
    transform-origin:center bottom;
    opacity:0;
    animation:pausaSteamRise 2.6s ease-in-out infinite;
  }
  .steam-2{animation-delay:.9s;}
  @keyframes pausaSteamRise{
    0%{opacity:0; transform:translateY(4px) scaleY(.8);}
    30%{opacity:.9;}
    80%{opacity:0; transform:translateY(-10px) scaleY(1.1);}
    100%{opacity:0; transform:translateY(-10px) scaleY(1.1);}
  }
  @keyframes pausaIconDondolo{
    0%,100%{transform:rotate(-4deg);}
    50%{transform:rotate(4deg);}
  }
  .contact-chips{
    opacity:0;
    animation:pausaChipsIn .8s ease forwards;
    animation-delay:1.5s;
  }
  @keyframes pausaChipsIn{
    from{opacity:0; transform:translateY(1rem);}
    to{opacity:1; transform:translateY(0);}
  }
  .closing-center .contact-chips,
  .slide[data-bg="verde"] .contact-chips{
    margin-top:0;
    margin-bottom:1.8rem;
  }
  /* CHIP CONTATTI, riusato in pausa, closing e widget fisso */
  .contact-chips{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:1.1rem;
    margin-top:1.8rem;
  }
  .contact-chip{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.4rem;
    background:rgba(20,35,63,.2);
    border:1px solid rgba(247,243,232,.3);
    border-radius:14px;
    padding:.9rem 1.1rem;
  }
  .contact-chip img{border-radius:8px; background:var(--crema);}
  .contact-chip-name{
    font-weight:700;
    font-size:1.05rem;
    text-align:center;
  }
  .contact-chip-numero{
    font-family:'IBM Plex Mono',monospace;
    font-weight:700;
    font-size:1.35rem;
    letter-spacing:.03em;
    opacity:1;
  }
  /* BOTTOMBAR */
  .bottombar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:1rem;
    padding:1rem 1.6rem 1.3rem;
  }
  .nav-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:1.3rem;
    background:transparent;
    border:1px solid rgba(247,243,232,.35);
    color:var(--crema);
    width:2.6rem;
    height:2.6rem;
    border-radius:50%;
    cursor:pointer;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .2s;
  }
  .nav-btn:hover{background:rgba(247,243,232,.15);}
  .nav-btn:focus-visible, .ghost-btn:focus-visible, .track-dot:focus-visible, .icon-btn:focus-visible{
    outline:2px solid var(--giallo);
    outline-offset:2px;
  }
  .track{
    flex:1 1 auto;
    display:flex;
    align-items:center;
    gap:.35rem;
    overflow-x:auto;
    padding:.3rem 0;
  }
  .track-group{
    display:flex;
    gap:.35rem;
    padding:0 .35rem;
    border-radius:999px;
  }
  .track-group.g-p1, .track-group.g-p3{background:rgba(31,56,100,.5);}
  .track-group.g-pausa{background:rgba(255,230,153,.18);}
  .track-group.g-p2{background:rgba(200,16,46,.18);}
  .track-dot.narrazione{opacity:.5;}
  .track-dot{
    width:.55rem;
    height:.55rem;
    border-radius:50%;
    background:rgba(247,243,232,.3);
    border:none;
    cursor:pointer;
    margin:.45rem 0;
    flex:0 0 auto;
    transition:background .2s, transform .2s;
  }
  .track-dot:hover{background:rgba(247,243,232,.6);}
  .track-dot.active{
    background:var(--crema);
    transform:scale(1.6);
    box-shadow:0 0 0 3px rgba(247,243,232,.35), 0 0 10px 2px rgba(247,243,232,.7);
  }
  .track-dot.narrazione.active{opacity:1;}
  .track-group.g-pausa .track-dot{width:1.3rem; border-radius:4px;}
  /* WIDGET CONTATTI FISSO */
  .contact-corner{
    position:fixed;
    left:.9rem;
    bottom:5.6rem;
    z-index:30;
    display:grid;
    grid-template-columns:repeat(2, auto);
    gap:.6rem;
    pointer-events:none;
  }
  .contact-corner .contact-chip{
    padding:.55rem .7rem;
    background:rgba(20,35,63,.72);
    border-color:rgba(247,243,232,.25);
    gap:.35rem;
  }
  .contact-corner .contact-chip img{width:170px; height:170px;}
  .contact-corner .contact-chip-name{font-size:.9rem;}
  .contact-corner .contact-chip-numero{font-size:1.05rem;}
  /* CORNER BADGE — "X DI Y" a nastro diagonale in alto a sinistra dello stage */
  #cornerBadge{
    position:absolute;
    top:3.4rem;
    left:-5rem;
    width:17rem;
    padding:.75rem 0;
    background:var(--giallo);
    color:var(--blu-deep);
    text-align:center;
    transform:rotate(-45deg);
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:1.45rem;
    letter-spacing:.05em;
    z-index:6;
    pointer-events:none;
    box-shadow:0 3px 16px rgba(0,0,0,.35);
  }
  /* SETTINGS PANEL */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(20,35,63,.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .overlay.open{display:flex;}
  .panel{
    background:var(--blu);
    border:1px solid rgba(247,243,232,.2);
    border-radius:18px;
    padding:1.8rem 2rem;
    max-width:760px;
    width:92vw;
    max-height:90vh;
    overflow-y:auto;
    text-align:left;
  }
  .panel-columns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0 2.2rem;
    align-items:start;
  }
  @media (max-width:640px){
    .panel-columns{grid-template-columns:1fr;}
  }
  .panel h2{
    font-family:'Space Grotesk',sans-serif;
    margin:0 0 1rem;
    font-size:1.3rem;
  }
  .panel label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:.75rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.7;
    margin-bottom:.4rem;
  }
  .panel input,
  .panel select{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:1rem;
    padding:.7rem .9rem;
    border-radius:10px;
    border:1px solid rgba(247,243,232,.3);
    background:rgba(247,243,232,.08);
    color:var(--crema);
    margin-bottom:1rem;
  }
  .panel select option{color:#1a1a1a;}
  .panel input::placeholder{
    color:var(--crema);
    opacity:.5;
  }
  .panel .row{
    display:flex;
    gap:.6rem;
    flex-wrap:wrap;
    margin-bottom:1rem;
  }
  .panel-section{
    padding-bottom:1.1rem;
    margin-bottom:1.1rem;
    border-bottom:1px solid rgba(247,243,232,.14);
  }
  .panel-section-last{border-bottom:none; margin-bottom:.4rem; padding-bottom:0;}
  .panel-section-title{
    font-family:'IBM Plex Mono',monospace;
    font-size:.7rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.55;
    margin:0 0 .8rem;
    font-weight:400;
  }
  .contact-fields-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0 .7rem;
  }
  .contact-field-col-title{
    font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    opacity:.6;
    margin-bottom:.5rem;
  }
  .contact-field-col input{
    padding:.55rem .6rem;
    font-size:.88rem;
    margin-bottom:.55rem;
  }
  .contact-field-col .ghost-btn{
    width:100%;
    font-size:.78rem;
    padding:.5rem .6rem;
  }
  .panel .status{
    font-family:'IBM Plex Mono',monospace;
    font-size:.8rem;
    opacity:.7;
    margin-top:.6rem;
    line-height:1.5;
  }
  .panel .close-row{
    text-align:right;
    margin-top:.6rem;
  }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-brand">
    <img class="logo-mark" src="logo.jpg" alt="SILP CGIL">
    <span>SILP CGIL</span>
  </span>
  <span class="topbar-section" id="sectionLabel"></span>
  <span class="topbar-right">
    <span class="topbar-counter" id="counter"></span>
    <span class="stats-badge" id="statsBadge" style="display:none">
      <div class="stat-pill" id="pillConnessi">
        <span class="stat-pill-num">🟢 <span id="pConnessi">—</span></span>
        <span class="stat-pill-label">connessi</span>
      </div>
      <div class="stat-pill" id="pillRisposte">
        <span class="stat-pill-num">✅ <span id="pRisposte">—</span></span>
        <span class="stat-pill-label">risposte</span>
      </div>
    </span>
    <button class="icon-btn" id="settingsBtn" aria-label="Impostazioni" title="Impostazioni e QR code">⚙</button>
  </span>
</div>
<div class="rejoin-qr" id="rejoinQr">
  <div class="rejoin-qr-label">Rientra qui</div>
  <img id="rejoinQrImg" width="100" height="100" alt="QR per tornare alla pagina allievi">
</div>

<div class="stage" id="stage"></div>
<div class="contact-corner" id="contactCorner"></div>

<div class="bottombar">
  <button class="nav-btn" id="prevBtn" aria-label="Slide precedente">‹</button>
  <div class="track" id="track"></div>
  <button class="nav-btn" id="nextBtn" aria-label="Slide successiva">›</button>
  <button class="nav-btn" id="fsBtn" aria-label="Schermo intero" title="Schermo intero (F)">⛶</button>
</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <div id="panelGate">
      <h2>Accesso relatore</h2>
      <label for="gatePinInput">PIN</label>
      <input type="password" id="gatePinInput" placeholder="Inserisci il PIN" autocomplete="off">
      <div class="row">
        <button class="ghost-btn" id="gateEnterBtn" style="border-color:var(--crema); color:var(--crema);">Entra</button>
      </div>
      <div class="status" id="gateStatus"></div>
      <div class="close-row">
        <button class="ghost-btn" id="gateCloseBtn" style="border-color:var(--crema); color:var(--crema);">Chiudi</button>
      </div>
    </div>

    <div id="panelBody" style="display:none;">
    <h2>Impostazioni relatore</h2>

    <div class="panel-columns">
      <div class="panel-col-left">
        <div class="panel-section panel-section-last">
          <h3 class="panel-section-title">Corso e sessione</h3>
          <label for="corsoInput">Numero del corso</label>
          <input type="text" id="corsoInput" placeholder="Esempio: 234">
          <div class="row">
            <button class="ghost-btn" id="saveCorsoBtn" style="border-color:var(--crema); color:var(--crema);">Salva numero corso</button>
          </div>
          <div class="row">
            <button class="ghost-btn" id="newSessionBtn" style="border-color:var(--crema); color:var(--crema);">Nuova sessione</button>
          </div>
          <label for="countdownInput">Durata countdown (secondi)</label>
          <input type="number" id="countdownInput" min="0" placeholder="15" value="15">
          <div class="row">
            <button class="ghost-btn" id="saveCountdownBtn" style="border-color:var(--crema); color:var(--crema);">Salva durata</button>
          </div>
          <label for="scuolaSelect">Scuola di questa conferenza</label>
          <select id="scuolaSelect">
            <option value="">Nessuna selezionata</option>
          </select>
          <div class="row">
            <button class="ghost-btn" id="saveScuolaBtn" style="border-color:var(--crema); color:var(--crema);">Salva scuola</button>
            <button class="ghost-btn" id="clearScuolaBtn" style="border-color:var(--rosso); color:var(--rosso); margin-left:.5rem;">✕ Svuota</button>
          </div>
        </div>
      </div>

      <div class="panel-col-right">
        <div class="panel-section panel-section-last">
          <h3 class="panel-section-title">Terzo e quarto contatto WhatsApp</h3>
          <div class="contact-fields-grid">
            <div class="contact-field-col">
              <div class="contact-field-col-title">Terzo</div>
              <input type="text" id="terzoNomeInput" placeholder="Nome">
              <input type="text" id="terzoCognomeInput" placeholder="Cognome">
              <input type="tel" id="terzoNumeroInput" placeholder="Numero, es. 3331234567">
              <button class="ghost-btn" id="saveTerzoBtn" style="border-color:var(--crema); color:var(--crema);">Salva terzo</button>
              <button class="ghost-btn" id="clearTerzoBtn" style="border-color:var(--rosso); color:var(--rosso); margin-top:.3rem;">✕ Svuota</button>
            </div>
            <div class="contact-field-col">
              <div class="contact-field-col-title">Quarto</div>
              <input type="text" id="quartoNomeInput" placeholder="Nome">

<script>
let current = 0;
let sessionId = null;

// Inizializzazione Firebase, sostituisce il vecchio backend Google Apps Script
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
let resultsTimer = null;
let activeCloud = null;
let courseNumber = localStorage.getItem('courseNumber') || '';
let scuolaCorrente = localStorage.getItem('scuolaCorrente') || '';

const ELENCO_SCUOLE = [
  'Scuola Allievi Agenti di Alessandria',
  'Scuola Allievi Agenti di Trieste',
  'Scuola Allievi Agenti di Caserta',
  'Scuola Allievi Agenti di Campobasso',

];

function dataOggiFormattata(){
  const mesi = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  const oggi = new Date();
  return oggi.getDate() + ' ' + mesi[oggi.getMonth()] + ' ' + oggi.getFullYear();
}
let countdownSeconds = parseInt(localStorage.getItem('countdownSeconds') || '15', 10);
let prevCloudWords = {};

const stage = document.getElementById('stage');
const sectionLabelEl = document.getElementById('sectionLabel');
const counterEl = document.getElementById('counter');
const trackEl = document.getElementById('track');
const statsBadge = document.getElementById('statsBadge');
const pConnessi = document.getElementById('pConnessi');
const pRisposte = document.getElementById('pRisposte');
const pillRisposte = document.getElementById('pillRisposte');
let statsTimer = null;

// Connessi: salita immediata, discesa progressiva.
// Ogni 20 secondi scendiamo del 10% del divario tra mostrato e reale (minimo 1 unità),
// così un crollo di massa non appare tutto in una volta ma si assorbe gradualmente.
// Alla slide pausa azzeriamo il mostrato: lo vedremo risalire mentre la gente rientra.
let connessiMostrati = 0;
let connessiReale    = 0;
let discesaConnessiTimer = null;
const DISCESA_INTERVALLO_MS  = 20000; // un passo ogni 20 secondi
const DISCESA_PERCENTUALE    = 0.10;  // 10% del divario per passo

function aggiornaConnessi(nVero){
  const tipoSlide = slides[current] && slides[current].type;
  if(tipoSlide === 'closing'){ statsBadge.style.display = 'none'; return; }

  connessiReale = nVero;

  if(nVero > connessiMostrati){
    // Salita: immediata, cancella qualsiasi timer di discesa in corso
    connessiMostrati = nVero;
    if(discesaConnessiTimer){ clearTimeout(discesaConnessiTimer); discesaConnessiTimer = null; }
    if(tipoSlide === 'title') suonaConnessione();
  } else if(nVero < connessiMostrati && !discesaConnessiTimer){
    // Discesa: avvia il processo progressivo solo se non è già in corso
    _scheduleDiscesa();
  }

  statsBadge.style.display = 'flex';
  pConnessi.textContent = connessiMostrati;
}

function _scheduleDiscesa(){
  discesaConnessiTimer = setTimeout(() => {
    discesaConnessiTimer = null;
    if(connessiReale >= connessiMostrati) return; // si sono riconnessi nel frattempo
    const divario = connessiMostrati - connessiReale;
    const calo    = Math.max(1, Math.floor(divario * DISCESA_PERCENTUALE));
    connessiMostrati = Math.max(connessiReale, connessiMostrati - calo);
    pConnessi.textContent = connessiMostrati;
    if(connessiMostrati > connessiReale) _scheduleDiscesa(); // continua finché non allineato
  }, DISCESA_INTERVALLO_MS);
}

function azzeraPeriodoConnessi(){
  connessiMostrati = 0;
  connessiReale    = 0;
  if(discesaConnessiTimer){ clearTimeout(discesaConnessiTimer); discesaConnessiTimer = null; }
}

// ===== Suoni brevi, una sola nota, non invasivi =====
let audioCtx = null;
// I browser bloccano l'audio finché non parte da un'azione diretta della persona.
// Il primo clic ovunque sulla pagina sblocca l'audio per tutto il resto della conferenza.
function sbloccaAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  document.removeEventListener('click', sbloccaAudio);
}
document.addEventListener('click', sbloccaAudio);

function suonaTono(frequenza, durataMs, volume){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = frequenza;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const adesso = audioCtx.currentTime;
    gain.gain.setValueAtTime(0.0001, adesso);
    gain.gain.exponentialRampToValueAtTime(volume, adesso + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, adesso + durataMs/1000);
    osc.start(adesso);
    osc.stop(adesso + durataMs/1000 + 0.03);
  } catch(e){}
}
// Suono per un nuovo connesso, solo sulla slide iniziale
function suonaConnessione(){ suonaTono(880, 130, 0.12); }
// Suono per una nuova risposta, sulle slide con domanda
// Suono per una nuova risposta, un campanellino con due toni invece di un tono secco
function suonaRisposta(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const adesso = audioCtx.currentTime;
    const durata = 0.32;

    // Tono principale, la nota del campanello
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(1318.5, adesso); // Mi acuto
    gain1.gain.setValueAtTime(0.0001, adesso);
    gain1.gain.exponentialRampToValueAtTime(0.11, adesso + 0.008);
    gain1.gain.exponentialRampToValueAtTime(0.0001, adesso + durata);
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start(adesso);
    osc1.stop(adesso + durata + 0.05);

    // Armonica sopra, più debole e più breve, dà il timbro metallico del campanello
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(1318.5 * 2, adesso);
    gain2.gain.setValueAtTime(0.0001, adesso);
    gain2.gain.exponentialRampToValueAtTime(0.045, adesso + 0.008);
    gain2.gain.exponentialRampToValueAtTime(0.0001, adesso + durata * 0.55);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(adesso);
    osc2.stop(adesso + durata + 0.05);
  } catch(e){}
}

// ===== COUNTDOWN 3 2 1 VIA! con musichetta =====
let cdTimers   = [];   // setTimeout IDs per la fase 3-2-1
let cdBarRAF   = null; // requestAnimationFrame per la barra
let cdRunning  = false;
let cdMasterGain = null; // gain globale per la musica — azzerarlo interrompe tutto

function stopCountdown(){
  cdTimers.forEach(t => clearTimeout(t));
  cdTimers = [];
  if(cdBarRAF){ cancelAnimationFrame(cdBarRAF); cdBarRAF = null; }
  if(cdMasterGain){
    try{ cdMasterGain.gain.setValueAtTime(0, audioCtx ? audioCtx.currentTime : 0); }catch(_){}
    cdMasterGain = null;
  }
  cdRunning = false;
  const ov = document.getElementById('cdCountdown');
  if(ov) ov.remove();
  document.querySelectorAll('.cd-big-num').forEach(e => e.remove());
  document.querySelectorAll('.countdown-bar').forEach(bar => bar.remove());
}

function startCountdownOnSlide(slideEl){
  if(!countdownSeconds || countdownSeconds <= 0) return;
  stopCountdown();
  cdRunning = true;

  // — Fase 1: overlay 3 2 1 VIA! —
  const ov = document.createElement('div');
  ov.id = 'cdCountdown';
  slideEl.appendChild(ov);
  const numEl = document.createElement('div');
  numEl.id = 'cdNumber';
  ov.appendChild(numEl);

  const steps = ['3','2','1','VIA!'];
  steps.forEach((txt, idx) => {
    const t = setTimeout(() => {
      if(!cdRunning) return;
      ov.classList.add('visible');
      numEl.className = txt === 'VIA!' ? 'via-text' : '';
      numEl.textContent = txt;
      // forza il riavvio dell'animazione
      numEl.style.animation = 'none';
      numEl.offsetHeight; // reflow
      numEl.style.animation = '';
      if(txt !== 'VIA!') playCountdownBeep(parseInt(txt));
      else                playCountdownGo();
    }, idx * 1000);
    cdTimers.push(t);
  });

  // — Fase 2: dopo 4 s nasconde overlay e avvia barra + musica —
  const tStart = setTimeout(() => {
    if(!cdRunning) return;
    ov.classList.remove('visible');
    setTimeout(() => { if(ov.parentNode) ov.remove(); }, 300);

    // Barra in cima alla slide
    const bar = document.createElement('div');
    bar.className = 'countdown-bar';
    slideEl.insertBefore(bar, slideEl.firstChild);

    // Numero grande in basso a destra
    const bigNum = document.createElement('div');
    bigNum.className = 'cd-big-num';
    bigNum.textContent = countdownSeconds;
    slideEl.appendChild(bigNum);

    // Musica
    startCountdownMusic(countdownSeconds);

    // Animazione barra + aggiornamento numero
    const t0  = performance.now();
    const totMs = countdownSeconds * 1000;
    function animBar(now){
      const elapsed  = now - t0;
      const frac     = Math.max(0, 1 - elapsed / totMs);
      bar.style.transform       = `scaleX(${frac})`;
      bar.style.transformOrigin = 'left center';
      const secLeft = Math.max(0, Math.ceil((totMs - elapsed) / 1000));
      bigNum.textContent = secLeft;
      const urgent = secLeft <= 5;
      bigNum.classList.toggle('urgent', urgent);
      if(elapsed < totMs){
        cdBarRAF = requestAnimationFrame(animBar);
      } else {
        bar.style.transform = 'scaleX(0)';
      }
    }
    cdBarRAF = requestAnimationFrame(animBar);
  }, 4000);
  cdTimers.push(tStart);
}

// Suono per 3, 2, 1 — pitch cresce avvicinandosi all'inizio
function playCountdownBeep(num){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const freq = [0, 780, 650, 520][num] || 600;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
    o.start(t); o.stop(t + 0.42);
  }catch(_){}
}

// Accordo ascendente per "VIA!"
function playCountdownGo(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime + i * 0.07;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.13 - i * 0.018, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.58);
      o.start(t); o.stop(t + 0.65);
    });
  }catch(_){}
}

// Musica durante il conto alla rovescia: tick che accelerano e salgono di pitch
function startCountdownMusic(seconds){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const ac  = audioCtx;
    cdMasterGain = ac.createGain();
    cdMasterGain.connect(ac.destination);
    cdMasterGain.gain.setValueAtTime(1, ac.currentTime);
    const now = ac.currentTime;

    for(let i = 0; i < seconds; i++){
      const progress  = i / seconds;
      const secsLeft  = seconds - i;
      const freq      = 280 + progress * 520;   // 280 → 800 Hz
      const vol       = 0.065 + progress * 0.07; // volume cresce leggermente
      _schedTick(ac, now + i, freq, vol);
      // battute intermedie negli ultimi 5 s
      if(secsLeft <= 5) _schedTick(ac, now + i + 0.5, freq * 0.72, vol * 0.5);
      // quarti di battuta negli ultimi 2 s
      if(secsLeft <= 2){
        _schedTick(ac, now + i + 0.25, freq * 0.62, vol * 0.32);
        _schedTick(ac, now + i + 0.75, freq * 0.62, vol * 0.32);
      }
    }
    // Allarme finale: tre note discendenti
    const endT = now + seconds;
    [800, 600, 400].forEach((f, i) => {
      const o = ac.createOscillator();
      o.type = 'sawtooth'; o.frequency.value = f;
      o.connect(cdMasterGain);
      const t0 = endT + i * 0.2;
      o.start(t0); o.stop(t0 + 0.5);
    });
  }catch(_){}
}

function _schedTick(ac, time, freq, vol){
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = 'triangle'; o.frequency.value = freq;
  o.connect(g); g.connect(cdMasterGain);
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(vol, time + 0.009);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.13);
  o.start(time); o.stop(time + 0.15);
}

function goTo(i){
  if(i < 0 || i >= slides.length) return;
  stopCountdown();
  fermaClassificaListener();
  chiudiClassificaOverlay();
  // Snapshot punteggi prima di cambiare slide: servirà per l'animazione "before/after"
  if(db && sessionId){
    db.ref(DB_PREFIX + '/sessions/' + sessionId + '/scores').once('value').then(snap => {
      prevScores = snap.exists() ? snap.val() : {};
    });
  }
  current = i;
  render();
  updateCornerBadge(i);
  attachVotesListener();
  // Avvia countdown sulle slide interattive, solo se non ci sono già risposte
  const s = slides[i];
  if((s.type === 'quiz' || s.type === 'sondaggio') && countdownSeconds > 0){
    if(db && sessionId){
      db.ref(DB_PREFIX + '/sessions/' + sessionId + '/votes/' + i).once('value').then(snap => {
        const hasVotes = snap.exists() && Object.keys(snap.val()).length > 0;
        const activeSlide = stage.querySelector('.slide.active');
        if(!activeSlide) return;
        if(hasVotes){
          aggiungiBtnRiavvia(activeSlide, i);
        } else {
          startCountdownOnSlide(activeSlide);
        }
      });
    } else {
      // Firebase non configurato: parti comunque
      const activeSlide = stage.querySelector('.slide.active');
      if(activeSlide) startCountdownOnSlide(activeSlide);
    }
  }
}

function playTick(progress){
  try{
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    // pitch sale con il progresso: da 480Hz a 1100Hz
    o.frequency.value = 480 + progress * 620;
    o.type = 'sine';
    const t = ac.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.055, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.045);
    o.start(t); o.stop(t + 0.05);
  } catch(_){}
}

function playDing(rank){ // rank 0=oro, 1=argento, 2=bronzo, altro=normale
  try{
    const ac = getAC();
    const t  = ac.currentTime;
    // nota base per ciascun posto
    const freqs = rank === 0 ? [880, 1108, 1320] : rank === 1 ? [740, 932, 1109] : rank === 2 ? [659, 830, 988] : [523, 659, 784];
    freqs.forEach((f, i) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      const t0 = t + i * 0.07;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.09 - i * 0.015, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.55);
      o.start(t0); o.stop(t0 + 0.6);
    });
  } catch(_){}
}

// ── Counter animato con suono ─────────────────────────────────────────────────
function countUp(el, from, to, durationMs, rank){
  const start = performance.now();
  const range = to - from;
  let lastTick = -1;
  const tickEvery = Math.max(1, Math.round(range / 18)); // ~18 tick totali
  function step(now){
    const elapsed = now - start;
    const t = Math.min(elapsed / durationMs, 1);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
    const current = Math.round(from + range * eased);
    el.textContent = current + ' pt';
    // suono tick ogni N unità
    if(range > 0 && Math.floor(current / tickEvery) > lastTick){
      lastTick = Math.floor(current / tickEvery);
      playTick(eased);
    }
    if(t < 1){
      requestAnimationFrame(step);
    } else {
      el.textContent = to + ' pt'; // valore esatto finale
      playDing(rank);
    }
  }
  requestAnimationFrame(step);
}

function renderClovLista(lista, scores, _unused){
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  if(sorted.length === 0){
    lista.innerHTML = '<div class="clov-empty">Nessun punteggio ancora — questa è la prima domanda.</div>';
    return;
  }
  lista.innerHTML = '';
  sorted.slice(0, 15).forEach(([nick, pts], i) => {
    const el = document.createElement('div');
    el.className = 'clov-riga ' + (i===0?'top1':i===1?'top2':i===2?'top3':'');
    el.dataset.nick = nick;
    const med = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    el.innerHTML = `<span class="clov-pos">${med}</span><span class="clov-nick">${nick}</span><span class="clov-pts">0 pt</span>`;
    lista.appendChild(el);
    const ptsEl = el.querySelector('.clov-pts');
    const delay = i * 60; // cascata: ogni riga parte 60ms dopo
    setTimeout(() => countUp(ptsEl, 0, pts, 1100, i), delay);
  });
}

function animateClovLista(lista, before, after){
  // Unione di tutti i nick
  const all = {};
  Object.keys(before).forEach(n => { all[n] = after[n] !== undefined ? after[n] : before[n]; });
  Object.keys(after).forEach(n => { all[n] = after[n]; });

  // FLIP — First: registra posizioni prima del reorder
  const firstPos = {};
  Array.from(lista.querySelectorAll('.clov-riga')).forEach(r => {
    firstPos[r.dataset.nick] = r.getBoundingClientRect().top;
  });

  // Ridisegna con nuova classifica + delta
  const sorted = Object.entries(all).sort((a,b) => b[1]-a[1]);
  lista.innerHTML = '';
  sorted.slice(0, 15).forEach(([nick, pts], i) => {
    const el = document.createElement('div');
    el.className = 'clov-riga ' + (i===0?'top1':i===1?'top2':i===2?'top3':'');
    el.dataset.nick = nick;
    const med    = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    const gained = pts - (before[nick] || 0);
    const deltaCls = gained > 0 ? 'su' : gained < 0 ? 'giu' : 'zero';
    const deltaStr = gained > 0 ? '+'+gained : gained === 0 ? '=' : gained;
    el.innerHTML = `<span class="clov-pos">${med}</span><span class="clov-nick">${nick}</span><span class="clov-delta ${deltaCls}">${deltaStr}</span><span class="clov-pts">${before[nick]||0} pt</span>`;
    if(gained > 0) el.classList.add('gained');
    lista.appendChild(el);
    if(gained !== 0){
      const ptsEl = el.querySelector('.clov-pts');
      const delay = i * 55;
      setTimeout(() => countUp(ptsEl, before[nick]||0, pts, 950, i), delay);
    }
  });

  // FLIP — Last → Invert → Play
  Array.from(lista.querySelectorAll('.clov-riga')).forEach(r => {
    const nick = r.dataset.nick;
    if(firstPos[nick] === undefined) return;
    const lastY = r.getBoundingClientRect().top;
    const dy    = firstPos[nick] - lastY;
    if(dy === 0) return;
    r.style.transform  = `translateY(${dy}px)`;
    r.style.transition = 'none';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        r.style.transition = 'transform .7s cubic-bezier(.4,0,.2,1)';
        r.style.transform  = '';
      });
    });
  });
}

async function fetchResults(slideIndex){

  try{

    const counts = {};

function applyResults(slideIndex, data){
  if(!data) return;
  const s = slides[slideIndex];
  const isWordcloud = s.type === 'wordcloud';
  const hasOptions = s.options && s.options.length > 0;
  const activeSlide = stage.querySelector('.slide.active');
  if(!activeSlide) return;

  if(hasOptions && !isWordcloud){
    const sigOpzioni = JSON.stringify(data.counts || {});
    if(prevCloudWords[slideIndex] !== undefined && prevCloudWords[slideIndex] !== sigOpzioni){
      mostraBadgeAggiornato(activeSlide);
    }
    prevCloudWords[slideIndex] = sigOpzioni;
    activeSlide.querySelectorAll('.option').forEach(optEl => {
      const key = optEl.dataset.key;
      const count = data.counts[key] || 0;
      const pct = data.total > 0 ? Math.round((count/data.total)*100) : 0;
      optEl.querySelector('.bar-fill').style.width = pct + '%';
      optEl.querySelector('.opt-count').textContent = count > 0 ? (count + ' · ' + pct + '%') : '';
    });
  } else {
    const wrap = activeSlide.querySelector('.cloud-wrap');
    if(!wrap) return;
    const canvas = wrap.querySelector('.cloud-canvas');
    const emptyEl = wrap.querySelector('.cloud-empty');
    const merged = {};
    Object.entries(data.counts || {}).forEach(([word,count]) => {
      const norm = String(word).trim().toLowerCase().replace(/\s+/g,' ');
      if(!norm) return;
      merged[norm] = (merged[norm]||0) + count;
    });
    const entries = Object.entries(merged);
    if(entries.length === 0){
      canvas.style.display = 'none';
      emptyEl.style.display = 'flex';
      activeCloud = null;
      return;
    }
    emptyEl.style.display = 'none';
    canvas.style.display = 'block';
    activeCloud = {canvas, entries};
    drawCloud(canvas, entries);
    // effetto pop e badge se sono arrivate parole nuove o conteggi cambiati
    const sig = JSON.stringify(merged);
    if(prevCloudWords[slideIndex] !== undefined && prevCloudWords[slideIndex] !== sig){
      popCanvas(canvas);
      mostraBadgeAggiornato(activeSlide);
    }
    prevCloudWords[slideIndex] = sig;
  }
}

function drawCloud(canvas, entries){
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.max(280, Math.round(rect.width));
  canvas.height = Math.max(160, Math.round(rect.height));
  const max = Math.max.apply(null, entries.map(e => e[1]));
  const palette = ['#FFE699','#F7F3E8','#9FD8FF'];
  function hashColor(word){
    let h = 0;
    for(let i=0;i<word.length;i++) h = (h*31 + word.charCodeAt(i)) | 0;
    return palette[Math.abs(h) % palette.length];
  }
  WordCloud(canvas, {
    list: entries.map(([w,c]) => [w.charAt(0).toUpperCase()+w.slice(1), c]),
    weightFactor: size => 14 + (size/max)*46,
    fontFamily: "'Inter', sans-serif",
    fontWeight: '800',
    color: word => hashColor(word),
    backgroundColor: 'transparent',
    rotateRatio: .15,
    rotationSteps: 2,
    minSize: 9,
    gridSize: Math.max(4, Math.round(canvas.width/120)),
    drawOutOfBound: false,
    shrinkToFit: true
  });
}

// Le slide con disabled:true vengono filtrate dall'array runtime.
async function loadSlidesConfig(){
  try{
    const snap = await db.ref(DB_PREFIX + '/slides_config/custom').once('value');
    if(snap.exists()){
      const all = snap.val();
      if(Array.isArray(all) && all.length > 0){
        slides = all.filter(s => !s.disabled);
      }
    }
  }catch(e){
    console.warn('loadSlidesConfig: impossibile caricare da Firebase, uso default.', e);
  }
}

async function initApp(){
  await loadSlidesConfig();
  buildTrack();
  buildSecIdxMap();
  refreshSession();
  render();
  renderContatti();
  buildRejoinQr();
  startStatsPolling();
  const sel = document.getElementById('scuolaSelect');
  if(sel){
    ELENCO_SCUOLE.forEach(nome => {
      const opt = document.createElement('option');
      opt.value = nome;
      opt.textContent = nome;
      sel.appendChild(opt);
    });
    sel.value = scuolaCorrente;
  }
}

initApp();

  panelStatus.textContent = 'Scuola rimossa.';

<script>
/* ============================================================
   EDITOR DOMANDE
   Gestisce un working copy (editorSlides) dell'array completo
   (incluse slide disabled). Al salvataggio scrive su Firebase
   e aggiorna il runtime slides[] + track bar.
   ============================================================ */

// Tipi bloccati: non editabili, non cancellabili, sempre attivi
const LOCKED_TYPES = ['title', 'closing', 'pausa'];

// Working copy usata nell'editor (include le disabled)
let editorSlides = [];
// Indice della riga attualmente espansa (-1 = nessuna)
let edOpenRow = -1;

// Apre l'editor
document.getElementById('openEditorBtn').addEventListener('click', () => {
  // Costruiamo editorSlides dal config Firebase (se presente) oppure dal default
  db.ref(DB_PREFIX + '/slides_config/custom').once('value').then(snap => {
    if(snap.exists() && Array.isArray(snap.val()) && snap.val().length > 0){
      editorSlides = JSON.parse(JSON.stringify(snap.val()));
    } else {
      // Nessun custom: usiamo il default come base
      editorSlides = JSON.parse(JSON.stringify(_slidesDefault));
    }
    renderEditorList();
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('editorOverlay').classList.add('open');
    document.getElementById('edStatus').textContent = '';
  }).catch(() => {
    editorSlides = JSON.parse(JSON.stringify(_slidesDefault));
    renderEditorList();
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('editorOverlay').classList.add('open');
    document.getElementById('edStatus').textContent = 'Attenzione: impossibile leggere config da Firebase. Mostro default.';
  });
});

document.getElementById('edCloseBtn').addEventListener('click', () => {
  document.getElementById('editorOverlay').classList.remove('open');
});

// ───── Salvataggio ─────
document.getElementById('edSaveBtn').addEventListener('click', async () => {
  document.getElementById('edStatus').textContent = 'Salvataggio…';
  try{
    const toSave = editorSlides.map(s => { const c = Object.assign({}, s); delete c._new; return c; });
    await db.ref(DB_PREFIX + '/slides_config/custom').set(toSave);
    await db.ref(DB_PREFIX + '/slides_config/savedAt').set(Date.now());
    // Aggiorna runtime
    slides = editorSlides.filter(s => !s.disabled);
    current = Math.min(current, slides.length - 1);
    buildTrack();
    buildSecIdxMap();
    updateCornerBadge(current);
    render();
    document.getElementById('edStatus').textContent = '✔ Salvato — ' + slides.length + ' slide attive.';
  }catch(e){
    document.getElementById('edStatus').textContent = '✖ Errore salvataggio: ' + e.message;
  }
});

// ───── Ripristina default ─────
document.getElementById('edResetBtn').addEventListener('click', async () => {
  if(!confirm('Ripristini le domande originali? Tutte le modifiche custom verranno cancellate.')) return;
  document.getElementById('edStatus').textContent = 'Ripristino…';
  try{
    await db.ref(DB_PREFIX + '/slides_config/custom').remove();
    editorSlides = JSON.parse(JSON.stringify(_slidesDefault));
    slides = _slidesDefault.slice();
    current = Math.min(current, slides.length - 1);
    buildTrack();
    buildSecIdxMap();
    updateCornerBadge(current);
    render();
    renderEditorList();
    document.getElementById('edStatus').textContent = '↺ Default ripristinato.';
  }catch(e){
    document.getElementById('edStatus').textContent = '✖ Errore ripristino: ' + e.message;
  }
});

// ───── Aggiungi domanda ─────
document.getElementById('edAddBtn').addEventListener('click', () => {
  // Aggiunge una nuova slide quiz vuota prima della closing (o in fondo)
  const newSlide = { type:'quiz', section:'p2', q:'', options:['',''], correct:0, answer:'', _new:true };
  const closingIdx = editorSlides.findIndex(s => s.type === 'closing');
  if(closingIdx > -1){
    editorSlides.splice(closingIdx, 0, newSlide);
    renderEditorList();
    // Apri subito il form della nuova slide
    const newRealIdx = closingIdx;
    toggleEdRow(newRealIdx);
    document.getElementById('edList').scrollTop = document.getElementById('edList').scrollHeight;
  } else {
    editorSlides.push(newSlide);
    renderEditorList();
    toggleEdRow(editorSlides.length - 1);
  }
  document.getElementById('edStatus').textContent = 'Nuova domanda aggiunta — ricorda di salvare.';
});

// ───── Render lista ─────
function renderEditorList(){
  const list = document.getElementById('edList');
  list.innerHTML = '';
  edOpenRow = -1;
  editorSlides.forEach((s, idx) => buildEdRow(s, idx));
}

function buildEdRow(s, idx){
  const list = document.getElementById('edList');
  const locked = LOCKED_TYPES.includes(s.type);

  const row = document.createElement('div');
  row.className = 'ed-row' + (locked ? ' locked' : '') + (s.disabled ? ' disabled-row' : '');
  row.dataset.edIdx = idx;

  // ── Header riga ──
  const head = document.createElement('div');
  head.className = 'ed-row-head';

  // Badge tipo
  const badge = document.createElement('span');
  badge.className = 'ed-type t-' + s.type;
  badge.textContent = edTypLabel(s.type);
  head.appendChild(badge);

  // Preview
  const preview = document.createElement('span');
  preview.className = 'ed-preview';
  preview.textContent = edPreview(s);
  head.appendChild(preview);

  // Toggle (non sui locked)
  if(!locked){
    const togLabel = document.createElement('label');
    togLabel.className = 'ed-toggle';
    const togCb = document.createElement('input');
    togCb.type = 'checkbox';
    togCb.checked = !s.disabled;
    togCb.addEventListener('change', () => {
      editorSlides[idx].disabled = !togCb.checked;
      row.classList.toggle('disabled-row', !!editorSlides[idx].disabled);
      document.getElementById('edStatus').textContent = 'Modifica non salvata.';
    });
    togLabel.appendChild(togCb);
    togLabel.appendChild(document.createTextNode('Attiva'));
    head.appendChild(togLabel);
  }

  // Pulsanti (non sui locked)
  const btns = document.createElement('div');
  btns.className = 'ed-row-btns';
  if(!locked){
    const editBtn = document.createElement('button');
    editBtn.className = 'ed-icon-btn';
    editBtn.title = 'Modifica';
    editBtn.textContent = '✎';
    editBtn.addEventListener('click', () => toggleEdRow(idx));
    btns.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'ed-icon-btn del';
    delBtn.title = 'Elimina';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => {
      if(!confirm('Eliminare questa domanda?')) return;
      editorSlides.splice(idx, 1);
      renderEditorList();
      document.getElementById('edStatus').textContent = 'Domanda eliminata — ricorda di salvare.';
    });
    btns.appendChild(delBtn);
  }
  head.appendChild(btns);
  row.appendChild(head);

  // ── Form espanso ──
  if(!locked){
    const form = document.createElement('div');
    form.className = 'ed-form';
    form.id = 'ed-form-' + idx;
    buildEdForm(form, s, idx);
    row.appendChild(form);
  }

  list.appendChild(row);
}

// Apre/chiude il form di una riga
function toggleEdRow(idx){
  // Chiude la precedente
  if(edOpenRow >= 0 && edOpenRow !== idx){
    const prevForm = document.getElementById('ed-form-' + edOpenRow);
    if(prevForm) prevForm.classList.remove('open');
  }
  const form = document.getElementById('ed-form-' + idx);
  if(!form) return;
  if(edOpenRow === idx){
    form.classList.remove('open');
    edOpenRow = -1;
  } else {
    form.classList.add('open');
    edOpenRow = idx;
    // Scroll leggero per portare il form in vista
    setTimeout(() => form.scrollIntoView({ behavior:'smooth', block:'nearest' }), 80);
  }
}

// Costruisce il form in base al tipo
function buildEdForm(container, s, idx){
  const type = s.type;

  if(type === 'quiz' || type === 'sondaggio'){
    // Selettore tipo
    appendTypeSelector(container, s, idx);
    // Domanda
    appendTextareaField(container, 'Domanda', s.q || '', val => { editorSlides[idx].q = val; updateEdPreview(idx); });
    // Opzioni
    const optsLabel = document.createElement('label');
    optsLabel.textContent = type === 'quiz' ? 'Opzioni (seleziona la risposta corretta →)' : 'Opzioni';
    container.appendChild(optsLabel);
    const optsWrap = document.createElement('div');
    optsWrap.id = 'ed-opts-' + idx;
    container.appendChild(optsWrap);
    rebuildOptsUI(optsWrap, s, idx);
    // Pulsante aggiungi opzione
    const addOptBtn = document.createElement('button');
    addOptBtn.className = 'ed-add-opt-btn';
    addOptBtn.textContent = '+ Aggiungi opzione';
    addOptBtn.addEventListener('click', () => {
      if(!editorSlides[idx].options) editorSlides[idx].options = [];
      editorSlides[idx].options.push('');
      rebuildOptsUI(optsWrap, editorSlides[idx], idx);
    });
    container.appendChild(addOptBtn);
    // Risposta (solo quiz)
    if(type === 'quiz'){
      appendTextareaField(container, 'Spiegazione risposta', s.answer || '', val => { editorSlides[idx].answer = val; });
    }
  } else if(type === 'wordcloud'){
    appendTypeSelector(container, s, idx);
    appendTextareaField(container, 'Domanda', s.q || '', val => { editorSlides[idx].q = val; updateEdPreview(idx); });
    // maxSelect
    const msLabel = document.createElement('label');
    msLabel.textContent = 'Selezioni massime per partecipante';
    container.appendChild(msLabel);
    const msInput = document.createElement('input');
    msInput.type = 'number';
    msInput.min = '1'; msInput.max = '5';
    msInput.value = s.maxSelect || 2;
    msInput.addEventListener('input', () => { editorSlides[idx].maxSelect = parseInt(msInput.value) || 2; });
    container.appendChild(msInput);
    // Opzioni (parole)
    const optsLabel = document.createElement('label');
    optsLabel.textContent = 'Parole / opzioni';
    container.appendChild(optsLabel);
    const optsWrap = document.createElement('div');
    optsWrap.id = 'ed-opts-' + idx;
    container.appendChild(optsWrap);
    rebuildOptsUI(optsWrap, s, idx, false);
    const addOptBtn = document.createElement('button');
    addOptBtn.className = 'ed-add-opt-btn';
    addOptBtn.textContent = '+ Aggiungi parola';
    addOptBtn.addEventListener('click', () => {
      if(!editorSlides[idx].options) editorSlides[idx].options = [];
      editorSlides[idx].options.push('');
      rebuildOptsUI(optsWrap, editorSlides[idx], idx, false);
    });
    container.appendChild(addOptBtn);
  } else if(type === 'narrazione'){
    appendTypeSelector(container, s, idx);
    appendInputField(container, 'Titolo', s.titolo || '', val => { editorSlides[idx].titolo = val; updateEdPreview(idx); });
    appendTextareaField(container, 'Testo', s.testo || '', val => { editorSlides[idx].testo = val; });
  }

  // Pulsanti in fondo al form — sempre presenti
  const formBtns = document.createElement('div');
  formBtns.style.cssText = 'display:flex;gap:.6rem;justify-content:flex-end;padding-top:.4rem;border-top:1px solid rgba(247,243,232,.08);margin-top:.2rem;';

  const annullaBtn = document.createElement('button');
  annullaBtn.className = 'ghost-btn';
  annullaBtn.style.cssText = 'border-color:rgba(247,243,232,.3);color:var(--crema);font-size:.82rem;padding:.4rem 1rem;';
  annullaBtn.textContent = s._new ? '✕ Scarta' : '✕ Chiudi';
  annullaBtn.addEventListener('click', () => {
    if(editorSlides[idx] && editorSlides[idx]._new){
      editorSlides.splice(idx, 1);
      renderEditorList();
      document.getElementById('edStatus').textContent = 'Domanda scartata.';
    } else {
      toggleEdRow(idx);
    }
  });
  formBtns.appendChild(annullaBtn);

  const saveFormBtn = document.createElement('button');
  saveFormBtn.className = 'ghost-btn';
  saveFormBtn.style.cssText = 'border-color:var(--accent-p3);color:var(--accent-p3);font-size:.82rem;padding:.4rem 1rem;';
  saveFormBtn.textContent = '💾 Salva';
  saveFormBtn.addEventListener('click', () => document.getElementById('edSaveBtn').click());
  formBtns.appendChild(saveFormBtn);

  container.appendChild(formBtns);
}

// Costruisce la lista opzioni con radio (quiz) o solo X (wordcloud/sondaggio)
function rebuildOptsUI(wrap, s, idx, showCorrectRadio){
  if(showCorrectRadio === undefined) showCorrectRadio = (s.type === 'quiz');
  wrap.innerHTML = '';
  const opts = s.options || [];
  opts.forEach((opt, oi) => {
    const row = document.createElement('div');
    row.className = 'ed-opt-row';
    if(showCorrectRadio){
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = 'correct-' + idx;
      radio.checked = (s.correct === oi);
      radio.title = 'Risposta corretta';
      radio.addEventListener('change', () => { editorSlides[idx].correct = oi; });
      row.appendChild(radio);
    }
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = opt;
    inp.placeholder = 'Opzione ' + (oi + 1);
    inp.addEventListener('input', () => { editorSlides[idx].options[oi] = inp.value; });
    row.appendChild(inp);
    const xBtn = document.createElement('button');
    xBtn.className = 'ed-icon-btn del';
    xBtn.textContent = '✕';
    xBtn.title = 'Rimuovi opzione';
    xBtn.addEventListener('click', () => {
      editorSlides[idx].options.splice(oi, 1);
      if(editorSlides[idx].correct >= editorSlides[idx].options.length){
        editorSlides[idx].correct = Math.max(0, editorSlides[idx].options.length - 1);
      }
      rebuildOptsUI(wrap, editorSlides[idx], idx, showCorrectRadio);
    });
    row.appendChild(xBtn);
    wrap.appendChild(row);
  });
}

// Selettore tipo (quiz/sondaggio/wordcloud/narrazione)
function appendTypeSelector(container, s, idx){
  const TIPI = ['quiz','sondaggio','wordcloud','narrazione'];
  const TIPI_LABEL = { quiz:'Quiz', sondaggio:'Sondaggio', wordcloud:'Word cloud', narrazione:'Narrazione' };
  const label = document.createElement('label');
  label.textContent = 'Tipo';
  container.appendChild(label);
  const wrap = document.createElement('div');
  wrap.className = 'ed-type-select';
  TIPI.forEach(t => {
    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'type-' + idx;
    radio.id = 'etype-' + idx + '-' + t;
    radio.value = t;
    radio.className = 'ed-type-radio';
    radio.checked = (s.type === t);
    radio.addEventListener('change', () => {
      if(!radio.checked) return;
      editorSlides[idx].type = t;
      // Sezione default per il tipo
      if(t === 'narrazione') editorSlides[idx].section = 'p3';
      else if(!editorSlides[idx].section) editorSlides[idx].section = 'p2';
      // Ricostruisce il form
      const form = document.getElementById('ed-form-' + idx);
      if(form){ form.innerHTML = ''; buildEdForm(form, editorSlides[idx], idx); }
      updateEdPreview(idx);
    });
    const lbl = document.createElement('label');
    lbl.htmlFor = 'etype-' + idx + '-' + t;
    lbl.className = 'ed-type-label';
    lbl.textContent = TIPI_LABEL[t];
    wrap.appendChild(radio);
    wrap.appendChild(lbl);
  });
  container.appendChild(wrap);
}

function appendTextareaField(container, labelText, value, onChange){
  const lbl = document.createElement('label');
  lbl.textContent = labelText;
  container.appendChild(lbl);
  const ta = document.createElement('textarea');
  ta.value = value;
  ta.rows = 2;
  ta.addEventListener('input', () => onChange(ta.value));
  container.appendChild(ta);
}

function appendInputField(container, labelText, value, onChange){
  const lbl = document.createElement('label');
  lbl.textContent = labelText;
  container.appendChild(lbl);
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = value;
  inp.addEventListener('input', () => onChange(inp.value));
  container.appendChild(inp);
}

// Aggiorna il testo di preview nella riga dopo una modifica
function updateEdPreview(idx){
  const row = document.querySelector('[data-ed-idx="' + idx + '"]');
  if(!row) return;
  const prev = row.querySelector('.ed-preview');
  if(prev) prev.textContent = edPreview(editorSlides[idx]);
  const badge = row.querySelector('.ed-type');
  if(badge){
    badge.className = 'ed-type t-' + editorSlides[idx].type;
    badge.textContent = edTypLabel(editorSlides[idx].type);
  }
}

function edTypLabel(type){
  return { quiz:'Quiz', sondaggio:'Sondaggio', wordcloud:'Cloud', narrazione:'Narrazione', pausa:'Pausa', title:'Inizio', closing:'Fine' }[type] || type;
}

function edPreview(s){
  if(s.type === 'title') return 'Slide iniziale + QR code';
  if(s.type === 'closing') return 'Slide finale — Grazie';
  if(s.type === 'pausa') return 'Pausa caffè';
  return s.q || s.titolo || '(nessun testo)';
}
